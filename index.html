<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 링크</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #f5f5f5; }

  .header {
    background: #fff;
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #eee;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: #222; }
  .header p { font-size: 12px; color: #888; margin-top: 4px; }

  .search-box {
    padding: 12px 16px;
    background: #fff;
    border-bottom: 1px solid #eee;
  }
  .search-box input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid #ddd; border-radius: 20px;
    font-size: 14px; outline: none;
  }
  .search-box input:focus { border-color: #ff6b35; }

  .products {
    padding: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .product-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.1s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .product-card:active { transform: scale(0.97); }

  .product-card img {
    width: 100%; aspect-ratio: 1;
    object-fit: cover; background: #f0f0f0;
  }
  .product-info { padding: 10px; }
  .product-name {
    font-size: 13px; font-weight: 600;
    color: #222; line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-price {
    font-size: 14px; font-weight: 700;
    color: #ff6b35; margin-top: 6px;
  }
  .product-num {
    font-size: 11px; color: #bbb;
    margin-top: 2px;
  }

  .no-result {
    grid-column: 1/-1;
    text-align: center; padding: 60px 20px;
    color: #aaa; font-size: 14px;
  }

  .notice {
    font-size: 11px; color: #aaa;
    text-align: center; padding: 16px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🛍️ 추천 상품</h1>
  <p>링크 클릭 시 수수료가 발생할 수 있습니다</p>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="상품 검색..." oninput="filterProducts()">
</div>

<div class="products" id="productGrid"></div>

<div class="notice">
  하단 링크로 구매하시면 채널 운영에 도움이 됩니다 😊
</div>

<script>
const products = [{"name": "테스트 상품 - 실제 상품으로 교체 예정", "price": "₩29,900", "image": "https://via.placeholder.com/300x300?text=상품", "link": "https://coupang.com"}];

function renderProducts(list) {
  const grid = document.getElementById('productGrid');
  if (list.length === 0) {
    grid.innerHTML = '<div class="no-result">검색 결과가 없어요 😢</div>';
    return;
  }
  grid.innerHTML = list.map((p, i) => `
    <a class="product-card" href="${p.link}" target="_blank" rel="noopener">
      <img src="${p.image}" alt="${p.name}" loading="lazy">
      <div class="product-info">
        <div class="product-num">#${String(i+1).padStart(4,'0')}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${p.price}</div>
      </div>
    </a>
  `).join('');
}

function filterProducts() {
  const q = document.getElementById('search').value.toLowerCase();
  renderProducts(q ? products.filter(p => p.name.toLowerCase().includes(q)) : products);
}

renderProducts(products);
</script>
</body>
</html>
